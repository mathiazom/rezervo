name: Code quality check
on:
  push:
    branches: ['main']
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked
      - name: Check formatting
        run: uv run poe fmtcheck
      - name: Check linting
        run: uv run poe lint
      - name: Check types
        run: uv run poe typecheck
